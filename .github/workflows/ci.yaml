name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]

env:
  BLENDER_VERSION: '5.1'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Setup Blender
        uses: bradyajohnston/setup-blender@v5
        with:
          version: ${{ env.BLENDER_VERSION }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Run lint checks
        run: mise run lint
