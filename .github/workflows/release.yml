name: Create Release Draft

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  BLENDER_VERSION: '5.1'

jobs:
  check-manifest:
    name: Check the Manifest
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.out.outputs.version }}
    steps:
      - name: Setup Blender
        uses: bradyajohnston/setup-blender@v5
        with:
          version: ${{ env.BLENDER_VERSION }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Validate blender_manifest.toml
        run: mise run lint:blender-extension

      - name: Read Addon Version
        id: read-version
        uses: SebRollen/toml-action@v1.2.0
        with:
          file: src/blender_manifest.toml
          field: version

      - name: Check For Release
        id: check-tag
        uses: mukunku/tag-exists-action@v1.7.0
        with:
          tag: v${{ steps.read-version.outputs.value }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Error If Release Exists
        if: ${{ steps.check-tag.outputs.exists != 'false' }}
        run: |
          echo "::error file=src/blender_manifest.toml,title=Refusing to Release::There is already a release with the version in src/blender_manifest.toml"
          exit 1

      - name: Output
        id: out
        run: |
          echo "version=${{ steps.read-version.outputs.value }}" >> $GITHUB_OUTPUT

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: check-manifest
    steps:
      - name: Setup Blender
        uses: bradyajohnston/setup-blender@v5
        with:
          version: ${{ env.BLENDER_VERSION }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Build the archive
        run: mise run build

      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          allowUpdates: true
          commit: master
          tag: v${{ needs.check-manifest.outputs.version }}
          name: Version ${{ needs.check-manifest.outputs.version }}
          omitBodyDuringUpdate: true
          artifacts: ./build/*
          draft: true
          prerelease: false
          generateReleaseNotes: true
