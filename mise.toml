[settings]
python.venv_stdlib = true

[tools]
python = "3.11"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.install]
alias = "i"
depends = "install:*"

[tasks.pre-commit]
depends = "install:requirements"
run = "black --check ."

[tasks.format]
depends = "install:requirements"
sources = ["**/*.py"]
run = "black ."

[tasks."install:requirements"]
sources = ["requirements-dev.txt"]
run = "pip install -r requirements-dev.txt"

[tasks."install:git-hooks"]
run = "mise generate git-pre-commit --write"
