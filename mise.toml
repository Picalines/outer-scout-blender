[settings]
python.venv_stdlib = true

[tools]
python = "3.11"

[env]
_.file = ".env"
_.python.venv = { path = ".venv", create = true }

[tasks.install]
alias = "i"
depends = "install:*"

[tasks.lint]
alias = "l"
depends = "lint:*"

[tasks.pre-commit]
depends = "install:requirements"
run = "black --check ."

[tasks.format]
depends = "install:requirements"
sources = ["**/*.py"]
run = "black ."

[tasks."lint:blender-extension"]
sources = [".env", "blender_manifest.toml"]
shell = "bash -c"
run = "'{{ env.BLENDER_BIN }}' --command extension validate"

[tasks."install:requirements"]
sources = ["requirements-dev.txt"]
run = "pip install -r requirements-dev.txt"

[tasks."install:git-hooks"]
run = "mise generate git-pre-commit --write"
